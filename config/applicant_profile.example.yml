# Applicant profile for auto-filling job applications.
# Copy this file to `applicant_profile.yml` and fill in your own details.
# `applicant_profile.yml` is gitignored so your PII is never published.

personal:
  first_name: "First"
  last_name: "Last"
  preferred_name: ""
  email: "you@example.com"
  phone: "555-555-5555"
  phone_country_code: "+1"
  location: "City, ST"

links:
  linkedin: "https://linkedin.com/in/your-handle"
  website: ""
  github: ""
  portfolio: ""

work_authorization:
  authorized_us: "Yes"
  sponsorship_required: "No"
