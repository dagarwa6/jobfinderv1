[scraping]
request_delay_seconds = 0.5
html_delay_seconds = 3.0
max_retries = 3
timeout_seconds = 30
max_concurrent_per_platform = 5

[filtering]
max_post_age_days = 30   # was 7 — the 7-day cutoff discarded ~64% of scraped jobs
min_match_score = 68     # was 75 — loosen title matching for higher recall
high_confidence_score = 85

[h1b]
green_threshold = 10
yellow_threshold = 1
lookback_years = 2

[output]
dashboard_dir = "output"
log_dir = "logs"
db_path = "data/jobs.db"
